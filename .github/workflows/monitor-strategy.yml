name: Strategy Position Monitor

on:
  schedule:
    # 每天7:01和15:01执行
    - cron: '1 7,15 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  monitor-position:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run position monitor
        env:
          AILABX_USERNAME: ${{ secrets.AILABX_USERNAME }}
          AILABX_PASSWORD: ${{ secrets.AILABX_PASSWORD }}
          WECHAT_WORK_WEBHOOK: ${{ secrets.WECHAT_WORK_WEBHOOK }}
        run: python scripts/monitor_position.py
